name: AgentScan
description: Scan repositories for AI agent, MCP, and launch-readiness risks.
author: AgentScan contributors

branding:
  icon: shield
  color: blue

inputs:
  path:
    description: Repository path to scan.
    required: false
    default: "."
  fail-on:
    description: Minimum severity that fails the workflow.
    required: false
    default: high
  format:
    description: Output format: text, json, or sarif.
    required: false
    default: text
  upload-sarif:
    description: Upload SARIF to GitHub code scanning.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install AgentScan
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"
    - name: Run AgentScan
      shell: bash
      run: |
        if [ "${{ inputs.format }}" = "sarif" ] || [ "${{ inputs.upload-sarif }}" = "true" ]; then
          set +e
          agentscan "${{ inputs.path }}" --format sarif --fail-on "${{ inputs.fail-on }}" > agentscan.sarif
          status=$?
          echo "$status" > "$RUNNER_TEMP/agentscan-exit-code"
          exit 0
        else
          agentscan "${{ inputs.path }}" --format "${{ inputs.format }}" --fail-on "${{ inputs.fail-on }}"
        fi
    - name: Upload SARIF
      if: ${{ inputs.upload-sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: agentscan.sarif
    - name: Fail on findings
      if: ${{ inputs.format == 'sarif' || inputs.upload-sarif == 'true' }}
      shell: bash
      run: exit "$(cat "$RUNNER_TEMP/agentscan-exit-code")"
